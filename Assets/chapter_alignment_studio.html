<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Chapter Alignment Studio</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #131a2b;
      --panel2: #182136;
      --accent: #60a5fa;
      --text: #e5e7eb;
      --left-width: 32%;
      --candidates-height: 30%;
    }

    * {
      box-sizing: border-box
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, Arial, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden
    }

    header {
      padding: 14px 20px;
      background: #0f172a;
      border-bottom: 1px solid #243047
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center
    }

    button,
    input {
      background: #1e293b;
      color: white;
      border: 1px solid #334155;
      padding: 8px 10px;
      border-radius: 8px
    }

    .main {
      display: grid;
      grid-template-columns: var(--left-width) 8px minmax(0, 1fr);
      flex: 1;
      min-height: 0
    }

    .left,
    .right {
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 0
    }

    .left {
      border-right: 1px solid #243047
    }

    .splitter {
      cursor: col-resize;
      background: linear-gradient(180deg, transparent, rgba(96, 165, 250, 0.18), transparent);
      border-left: 1px solid #243047;
      border-right: 1px solid #243047
    }

    .splitter:hover,
    .splitter.dragging {
      background: linear-gradient(180deg, transparent, rgba(96, 165, 250, 0.32), transparent)
    }

    .panel {
      padding: 10px
    }

    .panel-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px
    }

    .panel-actions {
      display: flex;
      gap: 8px;
      align-items: center
    }

    .panel-actions button {
      padding: 6px 10px;
      font-size: 12px
    }

    .viewer {
      flex: 1;
      overflow: auto;
      padding: 16px;
      background: var(--panel);
      min-height: 0
    }

    .line-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
      font-family: inherit;
      line-height: 1.5;
      white-space: normal
    }

    .line-row {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 14px;
      align-items: start;
      min-width: 0
    }

    .line-no {
      min-width: 2.5em;
      text-align: right;
      color: #94a3b8;
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
      user-select: none
    }

    .line-text {
      white-space: pre-wrap;
      word-break: break-word;
      min-width: 0
    }

    .candidates {
      overflow: auto;
      flex: 0 0 var(--candidates-height);
      padding: 12px
    }

    .right-body {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column
    }

    .vertical-splitter {
      height: 8px;
      cursor: row-resize;
      background: linear-gradient(90deg, transparent, rgba(96, 165, 250, 0.18), transparent);
      border-top: 1px solid #243047;
      border-bottom: 1px solid #243047;
      flex: 0 0 8px;
      touch-action: none;
      user-select: none
    }

    .vertical-splitter:hover,
    .vertical-splitter.dragging {
      background: linear-gradient(90deg, transparent, rgba(96, 165, 250, 0.32), transparent)
    }

    .card {
      background: var(--panel);
      border: 1px solid #2a3650;
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 10px;
      cursor: pointer
    }

    .card:hover {
      transform: translateY(-1px)
    }

    .card.active {
      outline: 2px solid var(--accent)
    }

    .bar {
      height: 8px;
      background: #0f172a;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 6px
    }

    .fill {
      height: 100%;
      background: linear-gradient(90deg, #22c55e, #eab308)
    }

    h3 {
      margin: 0 0 8px 0
    }

    .meta {
      display: flex;
      justify-content: space-between
    }

    pre {
      white-space: pre-wrap;
      line-height: 1.5
    }

    .panel-actions label {
      display: inline-flex;
      align-items: center;
      gap: 6px
    }

    .paragraph-block {
      background: var(--panel2);
      border: 1px solid #2a3650;
      border-radius: 12px;
      padding: 12px 12px 10px;
      margin-bottom: 10px;
      position: relative;
      white-space: pre-wrap;
      word-break: break-word
    }

    .paragraph-block.translation-error {
      border-color: #7f1d1d
    }

    .paragraph-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
      color: #93c5fd;
      font-size: 12px;
      user-select: none
    }

    .paragraph-no {
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
      letter-spacing: .02em
    }

    .paragraph-state {
      color: #94a3b8
    }

    .paragraph-text {
      line-height: 1.65;
      white-space: pre-wrap
    }

    .translation-tooltip {
      position: fixed;
      z-index: 9999;
      display: none;
      max-width: min(520px, calc(100vw - 24px));
      background: rgba(15, 23, 42, 0.98);
      color: #e5e7eb;
      border: 1px solid #334155;
      border-radius: 12px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.45);
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.55;
      white-space: pre-wrap;
      pointer-events: none
    }

    .translation-tooltip.visible {
      display: block
    }
  </style>
</head>

<body>
  <header>
    <div class="controls">
      <input type="file" id="folderPicker" webkitdirectory multiple>
      <label><input id="useAlignedFolders" type="checkbox"> Use Aligned Folders</label>
      <label><input id="autoTranslate" type="checkbox"> Auto-Translate</label>
      <label>Chapter <input id="chapterNum" style="width:90px"></label>
      <label>Top N <input id="topN" type="number" value="10" min="1" max="100" style="width:70px"></label>
      <button id="prevBtn">◀</button>
      <button id="nextBtn">▶</button>
      <span id="status">Load a folder containing JP, EN, and the similarity matrix JSON</span>
    </div>
  </header>

  <div class="main">
    <div class="left">
      <div class="panel">
          <div class="panel-top">
            <h3>JP Chapter</h3>
            <div class="panel-actions">
              <button id="copyJpBtn" type="button">Copy</button>
            </div>
          </div>
      </div>
      <div class="viewer">
          <div id="jpText" class="line-list"></div>
      </div>
    </div>

      <div id="splitter" class="splitter" aria-label="Resize chapter panels" role="separator"></div>

    <div class="right">
      <div class="panel">
          <div class="panel-top">
            <h3 id="rightTitle">Top Matches</h3>
            <div class="panel-actions">
              <button id="copyEnBtn" type="button">Copy</button>
            </div>
          </div>
      </div>
      <div class="right-body">
        <div class="candidates" id="candidates"></div>
        <div id="verticalSplitter" class="vertical-splitter" aria-label="Resize match and English panels" role="separator"></div>
        <div class="viewer">
            <div id="enText" class="line-list"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="jpTooltip" class="translation-tooltip" role="tooltip" aria-hidden="true"></div>

  <script>
    let jpFileRefs = new Map(), enFileRefs = new Map(), matrix = {};
    let jpTextCache = new Map();
    let enTextCache = new Map();
    let sortedMatchCache = new Map();

    let currentChapter = "1.txt";
    let currentEN = "";
    let selectedFiles = [];
    let isResizing = false;
    let isVerticalResizing = false;
    let renderToken = 0;
    let resizeRafToken = 0;
    let pendingResize = null;
    let resizeTarget = null;

    const MATRIX_FILE_NAMES = [
      "chapter_similarity_matrix.json",
      "chapter_smilarity_matrix.json"
    ];
    const ALIGNED_MANIFEST_FILE_NAME = "aligned_pairs_manifest.json";

    function getRootRelativePath(path) {
      const parts = path.split("/");
      return parts.slice(1).join("/");
    }

    function isMatrixFile(path) {
      const rootRelativePath = getRootRelativePath(path);
      return MATRIX_FILE_NAMES.includes(rootRelativePath);
    }

    function isAlignedManifestFile(path) {
      const rootRelativePath = getRootRelativePath(path);
      return rootRelativePath === ALIGNED_MANIFEST_FILE_NAME;
    }

    function updateStatus(message) {
      document.getElementById("status").textContent = message;
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function normalizeText(text) {
      return String(text ?? "").replace(/\r\n/g, "\n").trim();
    }

    function nextFrame() {
      return new Promise(resolve => requestAnimationFrame(() => resolve()));
    }

    function splitIntoParagraphs(text) {
      const normalized = normalizeText(text);
      if (!normalized) return [];
      return normalized
        .split(/\n\s*\n+/)
        .map(paragraph => paragraph.trim())
        .filter(Boolean);
    }

    async function readFileText(file, cache) {
      if (!file) return "";
      const cacheKey = file.webkitRelativePath || file.name;
      if (cache.has(cacheKey)) return cache.get(cacheKey);
      const text = await file.text();
      cache.set(cacheKey, text);
      return text;
    }

    async function getCurrentJpText() {
      const text = await readFileText(jpFileRefs.get(currentChapter), jpTextCache);
      return text || "Chapter not found";
    }

    async function getCurrentEnText() {
      const text = await readFileText(enFileRefs.get(currentEN), enTextCache);
      return text || "Missing chapter";
    }

    function renderLineNumberedText(containerId, text) {
      const container = document.getElementById(containerId);
      const lines = String(text ?? "").split(/\r?\n/);
      container.innerHTML = lines
        .map((line, index) => `
          <div class="line-row">
            <span class="line-no">${index + 1}</span>
            <span class="line-text">${line ? escapeHtml(line) : "&nbsp;"}</span>
          </div>
        `)
        .join("");
    }

    function renderParagraphShell(containerId, paragraphs) {
      const container = document.getElementById(containerId);
      container.innerHTML = paragraphs
        .map((_, index) => `
          <div class="paragraph-block" data-index="${index}" aria-busy="true">
            <div class="paragraph-meta">
              <span class="paragraph-no">P${index + 1}</span>
              <span class="paragraph-state">Queued</span>
            </div>
            <div class="paragraph-text">Translating…</div>
          </div>
        `)
        .join("");
    }

    function setLoadingState(containerId, message) {
      const container = document.getElementById(containerId);
      container.innerHTML = `
        <div class="paragraph-block">
          <div class="paragraph-text">${escapeHtml(message)}</div>
        </div>
      `;
    }

    function updateParagraphBlock(block, state, text, isError = false) {
      if (!block) return;
      const stateEl = block.querySelector(".paragraph-state");
      const textEl = block.querySelector(".paragraph-text");
      if (stateEl) stateEl.textContent = state;
      if (textEl) textEl.textContent = text;
      block.classList.toggle("translation-error", isError);
      block.setAttribute("aria-busy", isError ? "false" : "false");
    }

    async function renderParagraphTranslations(containerId, paragraphs, token) {
      renderParagraphShell(containerId, paragraphs);

      const container = document.getElementById(containerId);
      const blocks = Array.from(container.querySelectorAll(".paragraph-block"));

      for (let index = 0; index < paragraphs.length; index += 1) {
        if (token !== renderToken) return;
        //Skip if indx > 10
        if (index > 10){ updateParagraphBlock(blocks[index], "Original", paragraphs[index], false); continue;};
        const block = blocks[index];
        const original = paragraphs[index];
        if (block) {
          block.dataset.original = original;
        }

        try {
          const translated = await TranslationService.translateParagraph(original, {
            sourceLang: "ja",
            targetLang: "en",
            paragraphIndex: index
          });

          if (token !== renderToken) return;
          updateParagraphBlock(block, translated ? "EN" : "Original", translated || original, false);
        } catch (error) {
          if (token !== renderToken) return;
          updateParagraphBlock(block, "Original", original, true);
          if (block) block.title = `Translation failed: ${error.message}`;
        }
      }
    }

    async function copyToClipboard(text, label) {
      try {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          await navigator.clipboard.writeText(text);
        } else {
          const tempInput = document.createElement("textarea");
          tempInput.value = text;
          tempInput.style.position = "fixed";
          tempInput.style.left = "-9999px";
          tempInput.style.top = "-9999px";
          document.body.appendChild(tempInput);
          tempInput.focus();
          tempInput.select();
          document.execCommand("copy");
          tempInput.remove();
        }
        updateStatus(`${label} copied to clipboard`);
      } catch (error) {
        updateStatus(`Failed to copy ${label.toLowerCase()}: ${error.message}`);
      }
    }

    function setLeftPanelWidth(px) {
      const main = document.querySelector(".main");
      const bounds = main.getBoundingClientRect();
      const minLeft = 260;
      const maxLeft = Math.max(minLeft, bounds.width - 320);
      const clamped = Math.min(Math.max(px, minLeft), maxLeft);
      document.documentElement.style.setProperty("--left-width", `${clamped}px`);
      localStorage.setItem("chapterAlignmentLeftWidth", String(clamped));
    }

    function setCandidatesHeight(px) {
      const rightBody = document.querySelector(".right-body");
      const bounds = rightBody.getBoundingClientRect();
      const minHeight = 140;
      const splitterHeight = 8;
      const maxHeight = Math.max(minHeight, bounds.height - 220 - splitterHeight);
      const clamped = Math.min(Math.max(px, minHeight), maxHeight);
      document.documentElement.style.setProperty("--candidates-height", `${clamped}px`);
      localStorage.setItem("chapterAlignmentCandidatesHeight", String(clamped));
    }

    function initializeLeftPanelWidth() {
      const savedWidth = Number(localStorage.getItem("chapterAlignmentLeftWidth"));
      if (Number.isFinite(savedWidth) && savedWidth > 0) {
        setLeftPanelWidth(savedWidth);
        return;
      }

      const main = document.querySelector(".main");
      setLeftPanelWidth(main.getBoundingClientRect().width * 0.32);
    }

    function initializeCandidatesHeight() {
      const savedHeight = Number(localStorage.getItem("chapterAlignmentCandidatesHeight"));
      const rightBody = document.querySelector(".right-body");
      const bounds = rightBody.getBoundingClientRect();

      if (Number.isFinite(savedHeight) && savedHeight > 0) {
        setCandidatesHeight(savedHeight);
        return;
      }

      setCandidatesHeight(bounds.height * 0.3);
    }

    function getActiveFolders() {
      const useAligned = document.getElementById("useAlignedFolders").checked;
      return useAligned
        ? { jpFolder: "JP-Aligned", enFolder: "EN-Aligned" }
        : { jpFolder: "JP", enFolder: "EN" };
    }

    function buildMatrixFromAlignedManifest(alignedManifest) {
      const generatedMatrix = {};

      alignedManifest.forEach(entry => {
        const jpChapter = entry.jp_source;
        const enChapter = entry.en_source;
        const similarity = entry.similarity;

        if (!generatedMatrix[jpChapter]) {
          generatedMatrix[jpChapter] = {};
        }

        generatedMatrix[jpChapter][enChapter] = similarity;
      });
      return generatedMatrix;
    }

    function invalidateMatchCache() {
      sortedMatchCache.clear();
    }

    function getSortedMatches(chapter) {
      if (sortedMatchCache.has(chapter)) {
        return sortedMatchCache.get(chapter);
      }

      const sorted = Object.entries(matrix[chapter] || {}).sort((a, b) => b[1] - a[1]);
      sortedMatchCache.set(chapter, sorted);
      return sorted;
    }

    function renderMatchCards(matches) {
      const container = document.getElementById("candidates");
      container.innerHTML = "";

      if (!matches.length) {
        currentEN = "";
        document.getElementById("rightTitle").textContent = "Top Matches";
        setLoadingState("enText", "Missing chapter");
        container.innerHTML = "<div class=\"card\">No matches found</div>";
        return false;
      }

      matches.forEach((m, i) => {
        const [file, score] = m;
        const div = document.createElement("div");
        div.className = "card" + (i === 0 ? " active" : "");
        div.innerHTML = `
          <div class="meta">
            <strong>#${i + 1} ${file}</strong>
            <span>${(score * 100).toFixed(2)}%</span>
          </div>
          <div class="bar"><div class="fill" style="width:${score * 100}%"></div></div>
        `;

        div.onclick = async () => {
          document.querySelectorAll(".card").forEach(x => x.classList.remove("active"));
          div.classList.add("active");
          currentEN = file;
          const enText = await getCurrentEnText();
          renderLineNumberedText("enText", enText);
          document.getElementById("rightTitle").textContent = `Best Match: ${currentEN}`;
        };

        container.appendChild(div);
      });

      currentEN = matches[0][0];
      document.getElementById("rightTitle").textContent = `Best Match: ${currentEN}`;
      return true;
    }

    async function loadMatchDataFromFiles(files) {
      const useAlignedFolders = document.getElementById("useAlignedFolders").checked;

      if (useAlignedFolders) {
        //aligned_pairs_manifest.json
        //[{ "aligned_number": 1,"jp_source": "1.txt","en_source": "1.txt","similarity": 0.763826,  "segment_offset": 0}...]
        //

        const alignedManifestFile = files.find(file => isAlignedManifestFile(file.webkitRelativePath));

        if (!alignedManifestFile) {
          matrix = {};
          updateStatus("aligned_pairs_manifest.json not found at the folder root");
          return;
        }

        try {
          const txt = await alignedManifestFile.text();
          const alignedManifest = JSON.parse(txt);
          matrix = buildMatrixFromAlignedManifest(alignedManifest);
          invalidateMatchCache();

          const matrixChapters = Object.keys(matrix);
          if (matrixChapters.length) {
            currentChapter = matrixChapters[0];
            document.getElementById("chapterNum").value = currentChapter.replace(/\.txt$/i, "");
          }

          updateStatus(`Loaded ${jpFileRefs.size} JP chapters, ${enFileRefs.size} EN chapters, mapping from ${alignedManifestFile.name}`);
          await render();
        } catch (error) {
          matrix = {};
          updateStatus(`Failed to parse ${alignedManifestFile.name}: ${error.message}`);
        }

        return;
      }

      const matrixFile = files.find(file => isMatrixFile(file.webkitRelativePath));

      if (!matrixFile) {
        matrix = {};
        updateStatus("Matrix JSON not found at the folder root");
        return;
      }

      try {
        const txt = await matrixFile.text();
        matrix = JSON.parse(txt);
        invalidateMatchCache();

        const matrixChapters = Object.keys(matrix);
        if (matrixChapters.length) {
          currentChapter = matrixChapters[0];
          document.getElementById("chapterNum").value = currentChapter.replace(/\.txt$/i, "");
        }

        updateStatus(`Loaded ${jpFileRefs.size} JP chapters, ${enFileRefs.size} EN chapters, matrix from ${matrixFile.name}`);
        await render();
      } catch (error) {
        matrix = {};
        updateStatus(`Failed to parse ${matrixFile.name}: ${error.message}`);
      }
    }

    async function loadChapterFilesFromSelection(files) {
      jpFileRefs = new Map();
      enFileRefs = new Map();
      jpTextCache = new Map();
      enTextCache = new Map();

      const { jpFolder, enFolder } = getActiveFolders();

      for (const file of files) {
        const path = file.webkitRelativePath;

        if (path.includes(`/${jpFolder}/`) && file.name.endsWith(".txt")) {
          jpFileRefs.set(file.name, file);
          continue;
        }

        if (path.includes(`/${enFolder}/`) && file.name.endsWith(".txt")) {
          enFileRefs.set(file.name, file);
        }
      }
    }

    async function reloadFromSelection() {
      if (!selectedFiles.length) {
        updateStatus("Load a folder containing JP/EN or JP-Output/EN-Output and the matching JSON (chapter_similarity_matrix.json or arrangement_state.json)");
        return;
      }

      await loadChapterFilesFromSelection(selectedFiles);
      await loadMatchDataFromFiles(selectedFiles);
    }

    document
      .getElementById("folderPicker")
      .addEventListener("change", async (e) => {
        selectedFiles = Array.from(e.target.files);
        await reloadFromSelection();
      });

    document
      .getElementById("useAlignedFolders")
      .addEventListener("change", async () => {
        await reloadFromSelection();
      });

    async function render() {
      const token = ++renderToken;
      const chapter = document.getElementById("chapterNum").value || currentChapter.replace(".txt", "");
      currentChapter = chapter.endsWith(".txt") ? chapter : chapter + ".txt";
      const autoTranslate = document.getElementById("autoTranslate").checked;
      const topN = parseInt(document.getElementById("topN").value || 10, 10);
      const matches = getSortedMatches(currentChapter).slice(0, topN);

      if (!renderMatchCards(matches)) {
        return;
      }

      setLoadingState("enText", "Loading best match…");
      setLoadingState("jpText", "Loading chapter…");


      const enText = await getCurrentEnText();
      if (token !== renderToken) return;
      renderLineNumberedText("enText", enText);
      await nextFrame();

      const jpTextPromise = getCurrentJpText();
      await nextFrame();

      const jpText = await jpTextPromise;
      if (token !== renderToken) return;

      if (autoTranslate) {
        const paragraphs = splitIntoParagraphs(jpText);
        if (!paragraphs.length) {
          setLoadingState("jpText", "No text found");
        } else {
          await renderParagraphTranslations("jpText", paragraphs, token);
        }
      } else {
        renderLineNumberedText("jpText", jpText);
      }
    }

    document.getElementById("chapterNum").addEventListener("change", render);
    document.getElementById("topN").addEventListener("change", render);
    document.getElementById("autoTranslate").addEventListener("change", render);

    document.getElementById("copyJpBtn").onclick = async () => {
      const text = await getCurrentJpText();
      copyToClipboard(text, `JP chapter ${currentChapter}`);
    };

    document.getElementById("copyEnBtn").onclick = async () => {
        //Just copy english chapter
      if (!currentEN) {
        alert("No English chapter selected.");
        return;
      }

      const text = await getCurrentEnText();
      //Convert it to numbered lines
      const numberedText = text.split('\n').map((line, index) => `${index + 1}: ${line}`).join('\n');
      copyToClipboard(numberedText, `English chapter ${currentEN || "match"}`);
    };

    const splitter = document.getElementById("splitter");
    const verticalSplitter = document.getElementById("verticalSplitter");

    function queueResize(type, value) {
      pendingResize = { type, value };
      if (resizeRafToken) return;

      resizeRafToken = requestAnimationFrame(() => {
        resizeRafToken = 0;
        if (!pendingResize) return;

        if (pendingResize.type === "width") {
          setLeftPanelWidth(pendingResize.value);
        } else if (pendingResize.type === "height") {
          setCandidatesHeight(pendingResize.value);
        }

        pendingResize = null;
      });
    }

    function startResize(event, type) {
      event.preventDefault();
      resizeTarget = type;

      if (type === "width") {
        isResizing = true;
        splitter.classList.add("dragging");
      } else {
        isVerticalResizing = true;
        verticalSplitter.classList.add("dragging");
      }

      event.currentTarget.setPointerCapture?.(event.pointerId);
    }

    splitter.addEventListener("pointerdown", event => startResize(event, "width"));
    verticalSplitter.addEventListener("pointerdown", event => startResize(event, "height"));

    document.addEventListener("pointermove", event => {
      if (resizeTarget === "width" && isResizing) {
        queueResize("width", event.clientX);
        return;
      }

      if (resizeTarget === "height" && isVerticalResizing) {
        const rightBody = document.querySelector(".right-body");
        const bounds = rightBody.getBoundingClientRect();
        queueResize("height", event.clientY - bounds.top);
      }
    });

    function stopResize() {
      if (resizeTarget === "width") {
        isResizing = false;
        splitter.classList.remove("dragging");
      }

      if (resizeTarget === "height") {
        isVerticalResizing = false;
        verticalSplitter.classList.remove("dragging");
      }

      resizeTarget = null;
    }

    document.addEventListener("pointerup", stopResize);
    document.addEventListener("pointercancel", stopResize);

    window.addEventListener("resize", () => {
      const currentWidth = parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--left-width"));
      if (Number.isFinite(currentWidth)) {
        setLeftPanelWidth(currentWidth);
      }

      const currentHeight = parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--candidates-height"));
      if (Number.isFinite(currentHeight)) {
        setCandidatesHeight(currentHeight);
      }
    });

    document.getElementById("prevBtn").onclick = () => {
      let n = parseInt(document.getElementById("chapterNum").value || 1, 10) - 1;
      if (n < 1) n = 1;
      document.getElementById("chapterNum").value = n;
      render();
    };

    document.getElementById("nextBtn").onclick = () => {
      let n = parseInt(document.getElementById("chapterNum").value || 1, 10) + 1;
      if (n < 1) n = 1;
      document.getElementById("chapterNum").value = n;
      render();
    };

    document.addEventListener("keydown", e => {
      if (e.key === "ArrowLeft") document.getElementById("prevBtn").click();
      if (e.key === "ArrowRight") document.getElementById("nextBtn").click();
    });

    const TranslationService = (() => {
      const cache = new Map();
      const pending = new Map();
      let providerPromise = null;
      let provider = null;

      const DEFAULT_CONFIG = {
        endpoint: "http://localhost:1234/api/v1/chat",
        model: "crow-4b-opus-4.6-distill-heretic_qwen3.5",
        systemPrompt: "Translate the given Japanese text into natural English. Return only the translation, preserving paragraph breaks and meaning.",
        timeoutMs: 120000,
        headers: {}
      };

      function getConfig() {
        const custom = window.translationConfig && typeof window.translationConfig === "object"
          ? window.translationConfig
          : {};
        return {
          ...DEFAULT_CONFIG,
          ...custom,
          headers: {
            ...DEFAULT_CONFIG.headers,
            ...(custom.headers || {})
          }
        };
      }

      function buildRequestPayload(text, options, config) {
        if (typeof window.buildTranslationRequestPayload === "function") {
          return window.buildTranslationRequestPayload(text, options, config);
        }

        return {
          model: config.model,
          system_prompt: config.systemPrompt,
          input: text
        };
      }

      function extractTranslatedText(payload) {
        if (!payload) return "";

        if (typeof payload === "string") {
          return payload.trim();
        }

        if (typeof payload.output !== "undefined" && Array.isArray(payload.output)) {
          const messageParts = payload.output
            .filter(item => item && item.type === "message" && typeof item.content === "string")
            .map(item => item.content.trim())
            .filter(Boolean);

          if (messageParts.length) {
            return messageParts.join("\n").trim();
          }

          const fallbackParts = payload.output
            .map(item => typeof item?.content === "string" ? item.content.trim() : "")
            .filter(Boolean);

          if (fallbackParts.length) {
            return fallbackParts.join("\n").trim();
          }
        }

        if (typeof payload.translation === "string") return payload.translation.trim();
        if (typeof payload.content === "string") return payload.content.trim();
        if (typeof payload.text === "string") return payload.text.trim();

        return "";
      }

      async function createEndpointProvider() {
        return {
          name: "endpoint",
          async translate(text, options = {}) {
            const config = getConfig();
            const controller = new AbortController();
            const timeoutId = window.setTimeout(() => controller.abort(), config.timeoutMs);

            try {
              const response = await fetch(config.endpoint, {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                  ...config.headers
                },
                body: JSON.stringify(buildRequestPayload(text, options, config)),
                signal: controller.signal
              });

              if (!response.ok) {
                const detail = await response.text().catch(() => "");
                throw new Error(`Translation endpoint returned ${response.status}${detail ? `: ${detail}` : ""}`);
              }

              const payload = await response.json();
              const translated = extractTranslatedText(payload);
              if (!translated) {
                throw new Error("Translation endpoint returned no usable text");
              }
              return translated;
            } finally {
              window.clearTimeout(timeoutId);
            }
          }
        };
      }

      async function getProvider() {
        if (provider) return provider;
        if (!providerPromise) {
          providerPromise = createEndpointProvider().then(next => (provider = next));
        }
        return providerPromise;
      }

      async function translateParagraph(text, options = {}) {
        const normalized = normalizeText(text);
        if (!normalized) return "";

        const key = `${options.sourceLang || "ja"}|${options.targetLang || "en"}|${normalized}`;
        if (cache.has(key)) return cache.get(key);
        if (pending.has(key)) return pending.get(key);

        const request = (async () => {
          const activeProvider = await getProvider();
          const translated = await activeProvider.translate(normalized, options);
          cache.set(key, translated);
          return translated;
        })();

        pending.set(key, request);

        try {
          return await request;
        } finally {
          pending.delete(key);
        }
      }

      async function warmup() {
        const activeProvider = await getProvider();
        return activeProvider?.name || "unknown";
      }

      return {
        translateParagraph,
        warmup,
        clearCache() {
          cache.clear();
          pending.clear();
        },
        setProvider(nextProvider) {
          provider = nextProvider;
          providerPromise = Promise.resolve(nextProvider);
          cache.clear();
          pending.clear();
        },
        getConfig
      };
    })();

    const tooltip = document.getElementById("jpTooltip");

    function positionTooltip(event) {
      const offset = 16;
      const maxLeft = window.innerWidth - tooltip.offsetWidth - 12;
      const maxTop = window.innerHeight - tooltip.offsetHeight - 12;
      const left = Math.min(event.clientX + offset, maxLeft);
      const top = Math.min(event.clientY + offset, maxTop);
      tooltip.style.left = `${Math.max(12, left)}px`;
      tooltip.style.top = `${Math.max(12, top)}px`;
    }

    function attachTooltipHandlers() {
      document.addEventListener("mouseover", (event) => {
        const block = event.target.closest?.(".paragraph-block");
        if (!block || !block.dataset.original) return;
        tooltip.textContent = block.dataset.original;
        tooltip.classList.add("visible");
        tooltip.setAttribute("aria-hidden", "false");
        positionTooltip(event);
      });

      document.addEventListener("mousemove", (event) => {
        if (!tooltip.classList.contains("visible")) return;
        positionTooltip(event);
      });

      document.addEventListener("mouseout", (event) => {
        const block = event.target.closest?.(".paragraph-block");
        if (!block) return;
        const related = event.relatedTarget?.closest?.(".paragraph-block");
        if (related === block) return;
        tooltip.classList.remove("visible");
        tooltip.setAttribute("aria-hidden", "true");
      });
    }

    attachTooltipHandlers();
    initializeLeftPanelWidth();
    initializeCandidatesHeight();
    TranslationService.warmup().catch(() => {});
  </script>
</body>

</html>
