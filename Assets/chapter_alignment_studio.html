<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Chapter Alignment Studio</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #131a2b;
      --panel2: #182136;
      --accent: #60a5fa;
      --text: #e5e7eb;
      --left-width: 32%;
    }

    * {
      box-sizing: border-box
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, Arial, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column
    }

    header {
      padding: 14px 20px;
      background: #0f172a;
      border-bottom: 1px solid #243047
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center
    }

    button,
    input {
      background: #1e293b;
      color: white;
      border: 1px solid #334155;
      padding: 8px 10px;
      border-radius: 8px
    }

    .main {
      display: grid;
      grid-template-columns: var(--left-width) 8px minmax(0, 1fr);
      height: calc(100vh - 80px)
    }

    .left,
    .right {
      overflow: hidden;
      display: flex;
      flex-direction: column
    }

    .left {
      border-right: 1px solid #243047
    }

    .splitter {
      cursor: col-resize;
      background: linear-gradient(180deg, transparent, rgba(96, 165, 250, 0.18), transparent);
      border-left: 1px solid #243047;
      border-right: 1px solid #243047
    }

    .splitter:hover,
    .splitter.dragging {
      background: linear-gradient(180deg, transparent, rgba(96, 165, 250, 0.32), transparent)
    }

    .panel {
      padding: 10px
    }

    .panel-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px
    }

    .panel-actions {
      display: flex;
      gap: 8px;
      align-items: center
    }

    .panel-actions button {
      padding: 6px 10px;
      font-size: 12px
    }

    .viewer {
      flex: 1;
      overflow: auto;
      padding: 16px;
      background: var(--panel)
    }

    .line-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
      font-family: inherit;
      line-height: 1.5;
      white-space: normal
    }

    .line-row {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 14px;
      align-items: start;
      min-width: 0
    }

    .line-no {
      min-width: 2.5em;
      text-align: right;
      color: #94a3b8;
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
      user-select: none
    }

    .line-text {
      white-space: pre-wrap;
      word-break: break-word;
      min-width: 0
    }

    .candidates {
      overflow: auto;
      height: 30%;
      padding: 12px
    }

    .card {
      background: var(--panel);
      border: 1px solid #2a3650;
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 10px;
      cursor: pointer
    }

    .card:hover {
      transform: translateY(-1px)
    }

    .card.active {
      outline: 2px solid var(--accent)
    }

    .bar {
      height: 8px;
      background: #0f172a;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 6px
    }

    .fill {
      height: 100%;
      background: linear-gradient(90deg, #22c55e, #eab308)
    }

    h3 {
      margin: 0 0 8px 0
    }

    .meta {
      display: flex;
      justify-content: space-between
    }

    pre {
      white-space: pre-wrap;
      line-height: 1.5
    }
  </style>
</head>

<body>
  <header>
    <div class="controls">
      <input type="file" id="folderPicker" webkitdirectory multiple>
      <label><input id="useOutputFolders" type="checkbox"> Use Output Folders</label>
      <label>Chapter <input id="chapterNum" style="width:90px"></label>
      <label>Top N <input id="topN" type="number" value="10" min="1" max="100" style="width:70px"></label>
      <button id="prevBtn">◀</button>
      <button id="nextBtn">▶</button>
      <span id="status">Load a folder containing JP, EN, and the similarity matrix JSON</span>
    </div>
  </header>

  <div class="main">
    <div class="left">
      <div class="panel">
          <div class="panel-top">
            <h3>JP Chapter</h3>
            <div class="panel-actions">
              <button id="copyJpBtn" type="button">Copy</button>
            </div>
          </div>
      </div>
      <div class="viewer">
          <div id="jpText" class="line-list"></div>
      </div>
    </div>

      <div id="splitter" class="splitter" aria-label="Resize chapter panels" role="separator"></div>

    <div class="right">
      <div class="panel">
          <div class="panel-top">
            <h3 id="rightTitle">Top Matches</h3>
            <div class="panel-actions">
              <button id="copyEnBtn" type="button">Copy</button>
            </div>
          </div>
      </div>
      <div class="candidates" id="candidates"></div>
      <div class="viewer">
          <div id="enText" class="line-list"></div>
      </div>
    </div>
  </div>

  <script>
    let jpFiles = {}, enFiles = {}, matrix = {};
    let currentChapter = "1.txt";
    let currentEN = "";
    let selectedFiles = [];
    let isResizing = false;

    const MATRIX_FILE_NAMES = [
      "chapter_similarity_matrix.json",
      "chapter_smilarity_matrix.json"
    ];
    const ARRANGEMENT_STATE_FILE_NAME = "arrangement_state.json";

    function getRootRelativePath(path) {
      const parts = path.split("/");
      return parts.slice(1).join("/");
    }

    function isMatrixFile(path) {
      const rootRelativePath = getRootRelativePath(path);
      return MATRIX_FILE_NAMES.includes(rootRelativePath);
    }

    function isArrangementStateFile(path) {
      const rootRelativePath = getRootRelativePath(path);
      return rootRelativePath === ARRANGEMENT_STATE_FILE_NAME;
    }

    function updateStatus(message) {
      document.getElementById("status").textContent = message;
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function renderLineNumberedText(containerId, text) {
      const container = document.getElementById(containerId);
      const lines = String(text ?? "").split(/\r?\n/);
      container.innerHTML = lines
        .map((line, index) => `
          <div class="line-row">
            <span class="line-no">${index + 1}</span>
            <span class="line-text">${line ? escapeHtml(line) : "&nbsp;"}</span>
          </div>
        `)
        .join("");
    }

    async function copyToClipboard(text, label) {
      try {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          await navigator.clipboard.writeText(text);
        } else {
          const tempInput = document.createElement("textarea");
          tempInput.value = text;
          tempInput.style.position = "fixed";
          tempInput.style.left = "-9999px";
          document.body.appendChild(tempInput);
          tempInput.focus();
          tempInput.select();
          document.execCommand("copy");
          tempInput.remove();
        }
        updateStatus(`${label} copied to clipboard`);
      } catch (error) {
        updateStatus(`Failed to copy ${label.toLowerCase()}: ${error.message}`);
      }
    }

    function getCurrentJpText() {
      return jpFiles[currentChapter] || "Chapter not found";
    }

    function getCurrentEnText() {
      return enFiles[currentEN] || "Missing chapter";
    }

    function setLeftPanelWidth(px) {
      const main = document.querySelector(".main");
      const bounds = main.getBoundingClientRect();
      const minLeft = 260;
      const maxLeft = Math.max(minLeft, bounds.width - 320);
      const clamped = Math.min(Math.max(px, minLeft), maxLeft);
      document.documentElement.style.setProperty("--left-width", `${clamped}px`);
      localStorage.setItem("chapterAlignmentLeftWidth", String(clamped));
    }

    function initializeLeftPanelWidth() {
      const savedWidth = Number(localStorage.getItem("chapterAlignmentLeftWidth"));
      if (Number.isFinite(savedWidth) && savedWidth > 0) {
        setLeftPanelWidth(savedWidth);
        return;
      }

      const main = document.querySelector(".main");
      setLeftPanelWidth(main.getBoundingClientRect().width * 0.32);
    }

    function getActiveFolders() {
      const useOutput = document.getElementById("useOutputFolders").checked;
      return useOutput
        ? { jpFolder: "JP-Output", enFolder: "EN-Output" }
        : { jpFolder: "JP", enFolder: "EN" };
    }

    function buildMatrixFromArrangementState(arrangementState) {
      const chapterMap = arrangementState?.chapters || {};
      const generatedMatrix = {};

      for (const [jpChapter, details] of Object.entries(chapterMap)) {
        if (!details || typeof details !== "object") continue;

        let enChapter = details.output_chapter || details.en_chapter || details.primary_en_chapter;
        if (enChapter == null || enChapter === "") continue;

        enChapter = String(enChapter);
        if (!enChapter.endsWith(".txt")) {
          enChapter = `${enChapter}.txt`;
        }

        const score = Number.isFinite(details.final_confidence)
          ? details.final_confidence
          : (Number.isFinite(details.semantic_val) ? details.semantic_val : 0);

        generatedMatrix[jpChapter] = { [enChapter]: score };
      }

      return generatedMatrix;
    }

    async function loadMatchDataFromFiles(files) {
      const useOutputFolders = document.getElementById("useOutputFolders").checked;

      if (useOutputFolders) {
        const arrangementStateFile = files.find(file => isArrangementStateFile(file.webkitRelativePath));

        if (!arrangementStateFile) {
          matrix = {};
          updateStatus("arrangement_state.json not found at the folder root");
          return;
        }

        try {
          const txt = await arrangementStateFile.text();
          const arrangementState = JSON.parse(txt);
          matrix = buildMatrixFromArrangementState(arrangementState);

          const matrixChapters = Object.keys(matrix);
          if (matrixChapters.length) {
            currentChapter = matrixChapters[0];
            document.getElementById("chapterNum").value = currentChapter.replace(/\.txt$/i, "");
          }

          updateStatus(`Loaded ${Object.keys(jpFiles).length} JP chapters, ${Object.keys(enFiles).length} EN chapters, mapping from ${arrangementStateFile.name}`);
          render();
        } catch (error) {
          matrix = {};
          updateStatus(`Failed to parse ${arrangementStateFile.name}: ${error.message}`);
        }

        return;
      }

      const matrixFile = files.find(file => isMatrixFile(file.webkitRelativePath));

      if (!matrixFile) {
        matrix = {};
        updateStatus("Matrix JSON not found at the folder root");
        return;
      }

      try {
        const txt = await matrixFile.text();
        matrix = JSON.parse(txt);

        const matrixChapters = Object.keys(matrix);
        if (matrixChapters.length) {
          currentChapter = matrixChapters[0];
          document.getElementById("chapterNum").value = currentChapter.replace(/\.txt$/i, "");
        }

        updateStatus(`Loaded ${Object.keys(jpFiles).length} JP chapters, ${Object.keys(enFiles).length} EN chapters, matrix from ${matrixFile.name}`);
        render();
      } catch (error) {
        matrix = {};
        updateStatus(`Failed to parse ${matrixFile.name}: ${error.message}`);
      }
    }

    async function loadChapterFilesFromSelection(files) {
      jpFiles = {};
      enFiles = {};

      const { jpFolder, enFolder } = getActiveFolders();

      for (const file of files) {
        const path = file.webkitRelativePath;

        if (path.includes(`/${jpFolder}/`) && file.name.endsWith(".txt")) {
          jpFiles[file.name] = await file.text();
          continue;
        }

        if (path.includes(`/${enFolder}/`) && file.name.endsWith(".txt")) {
          enFiles[file.name] = await file.text();
        }
      }
    }

    async function reloadFromSelection() {
      if (!selectedFiles.length) {
        updateStatus("Load a folder containing JP/EN or JP-Output/EN-Output and the matching JSON (chapter_similarity_matrix.json or arrangement_state.json)");
        return;
      }

      await loadChapterFilesFromSelection(selectedFiles);
      await loadMatchDataFromFiles(selectedFiles);
    }

    document
      .getElementById("folderPicker")
      .addEventListener("change", async (e) => {
        selectedFiles = Array.from(e.target.files);
        await reloadFromSelection();
      });

    document
      .getElementById("useOutputFolders")
      .addEventListener("change", async () => {
        await reloadFromSelection();
      });

    function render() {
      const chapter = document.getElementById("chapterNum").value || currentChapter.replace(".txt", "");
      currentChapter = chapter.endsWith(".txt") ? chapter : chapter + ".txt";
      renderLineNumberedText("jpText", getCurrentJpText());

      const topN = parseInt(document.getElementById("topN").value || 10);

      let matches = Object.entries(matrix[currentChapter] || {})
        .sort((a, b) => b[1] - a[1])
        .slice(0, topN);

      const container = document.getElementById("candidates");
      container.innerHTML = "";

      if (!matches.length) {
        currentEN = "";
        document.getElementById("rightTitle").textContent = "Top Matches";
        renderLineNumberedText("enText", "Missing chapter");
        container.innerHTML = "<div class=\"card\">No matches found</div>";
        return;
      }

      matches.forEach((m, i) => {
        const [file, score] = m;
        const div = document.createElement("div");
        div.className = "card" + (i === 0 ? " active" : "");
        div.innerHTML = `
      <div class="meta">
        <strong>#${i + 1} ${file}</strong>
        <span>${(score * 100).toFixed(2)}%</span>
      </div>
      <div class="bar"><div class="fill" style="width:${score * 100}%"></div></div>
   `;

        div.onclick = () => {
          document.querySelectorAll(".card").forEach(x => x.classList.remove("active"));
          div.classList.add("active");
          currentEN = file;
          renderLineNumberedText("enText", getCurrentEnText());
          document.getElementById("rightTitle").textContent = `Best Match: ${currentEN}`;
        };

        container.appendChild(div);
      });

      currentEN = matches[0][0];
      renderLineNumberedText("enText", getCurrentEnText());
      document.getElementById("rightTitle").textContent = `Best Match: ${currentEN}`;
    }

    document.getElementById("chapterNum").addEventListener("change", render);
    document.getElementById("topN").addEventListener("change", render);

    document.getElementById("copyJpBtn").onclick = () => {
      copyToClipboard(getCurrentJpText(), `JP chapter ${currentChapter}`);
    };

    document.getElementById("copyEnBtn").onclick = () => {
      copyToClipboard(getCurrentEnText(), `English chapter ${currentEN || "match"}`);
    };

    const splitter = document.getElementById("splitter");

    splitter.addEventListener("mousedown", () => {
      isResizing = true;
      splitter.classList.add("dragging");
    });

    document.addEventListener("mousemove", (event) => {
      if (!isResizing) return;
      setLeftPanelWidth(event.clientX);
    });

    document.addEventListener("mouseup", () => {
      if (!isResizing) return;
      isResizing = false;
      splitter.classList.remove("dragging");
    });

    window.addEventListener("resize", () => {
      const currentWidth = parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--left-width"));
      if (Number.isFinite(currentWidth)) {
        setLeftPanelWidth(currentWidth);
      }
    });

    document.getElementById("prevBtn").onclick = () => {
      let n = parseInt(document.getElementById("chapterNum").value || 1) - 1;
      if (n < 1) n = 1;
      document.getElementById("chapterNum").value = n;
      render();
    };

    document.getElementById("nextBtn").onclick = () => {
      let n = parseInt(document.getElementById("chapterNum").value || 1) + 1;
      document.getElementById("chapterNum").value = n;
      render();
    };

    document.addEventListener("keydown", e => {
      if (e.key === "ArrowLeft") document.getElementById("prevBtn").click();
      if (e.key === "ArrowRight") document.getElementById("nextBtn").click();
    });

    initializeLeftPanelWidth();
  </script>
</body>

</html>
