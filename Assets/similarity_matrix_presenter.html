<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enterprise Chapter Alignment Analyzer</title>

<style>
    :root { 
        --bg: #090d16; 
        --panel: #0f172a; 
        --accent: #3b82f6; 
        --text: #f1f5f9;
        --border: rgba(255,255,255,0.08);
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; overflow: hidden; height: 100vh; }
    
    .layout { display: grid; grid-template-columns: 320px 1fr; height: 100vh; }
    
    /* Sidebar Styling */
    .sidebar { 
        background: var(--panel); 
        border-right: 1px solid var(--border); 
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }
    .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); }
    .sidebar-header h3 { font-size: 18px; margin-bottom: 4px; color: #fff; }
    .sidebar-header p { font-size: 12px; opacity: 0.6; }
    
    .chapter-list { flex: 1; overflow-y: auto; padding: 10px; }
    .chapter-item { 
        padding: 10px 14px; 
        border-radius: 8px; 
        margin-bottom: 4px; 
        font-size: 13px; 
        cursor: pointer;
        transition: background 0.2s, border-color 0.2s;
        border: 1px solid transparent;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .chapter-item:hover { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.1); }
    .chapter-num { font-weight: 600; opacity: 0.5; font-mono: monospace; margin-right: 8px; }
    .chapter-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .prediction-badge { font-size: 11px; background: rgba(59, 130, 246, 0.2); color: #60a5fa; padding: 2px 6px; border-radius: 4px; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: none; }
    .chapter-item:hover .prediction-badge { display: block; }
    
    /* Main Panel Styling */
    .main { display: flex; flex-direction: column; padding: 20px; overflow: hidden; position: relative; }
    .controls { 
        margin-bottom: 15px; 
        display: flex; 
        justify-content: space-between; 
        align-items: center;
        background: var(--panel);
        padding: 12px 20px;
        border-radius: 12px;
        border: 1px solid var(--border);
    }
    .file-input-wrapper { display: flex; align-items: center; gap: 15px; }
    input[type="file"] { color: #94a3b8; font-size: 13px; }
    .instructions { font-size: 12px; color: #94a3b8; }
    
    #canvas-container { 
        flex: 1; 
        background: #040711; 
        border-radius: 12px; 
        cursor: grab; 
        position: relative; 
        border: 1px solid var(--border); 
        overflow: hidden; 
    }
    #canvas-container:active { cursor: grabbing; }
    canvas { display: block; width: 100%; height: 100%; }
    
    /* Fixed Interactive Tooltip */
    .tooltip { 
        position: fixed; 
        background: rgba(15, 23, 42, 0.95); 
        padding: 12px; 
        border-radius: 8px; 
        border: 1px solid var(--accent); 
        pointer-events: none; 
        display: none; 
        z-index: 1000; 
        font-size: 12px; 
        box-shadow: 0 10px 15px -3px rgba(0,0,0,0.7);
        backdrop-filter: blur(4px);
        line-height: 1.5;
    }
    .tooltip strong { color: #fff; }
    .tooltip .score-val { font-size: 14px; font-weight: bold; margin-top: 4px; color: #4ade80;}
</style>
</head>
<body>

<div class="layout">
    <div class="sidebar">
        <div class="sidebar-header">
            <h3>Chapters Matrix</h3>
            <p id="matrix-dimens">No matrix loaded</p>
        </div>
        <div class="chapter-list" id="chapterList"></div>
    </div>
    <div class="main">
        <div class="controls">
            <div class="file-input-wrapper">
                <input type="file" id="fileInput" accept=".json">
            </div>
            <div class="instructions">💡 Scroll to Zoom | Drag Matrix to Pan | Hover Nodes for Insights</div>
        </div>
        <div id="canvas-container">
            <canvas id="heatmapCanvas"></canvas>
        </div>
    </div>
</div>

<div id="tooltip" class="tooltip"></div>

<script>
let data = {};
let jpKeys = [], enKeys = [];
let bestMatches = new Map(); // Fast lookup structure for index matching

const canvas = document.getElementById('heatmapCanvas');
const ctx = canvas.getContext('2d');
const container = document.getElementById('canvas-container');
const tooltip = document.getElementById('tooltip');

// Offscreen Buffer for high performance graphics mapping
let offscreenCanvas = document.createElement('canvas');
let offscreenCtx = offscreenCanvas.getContext('2d');
let isBufferReady = false;

// Configurable Canvas Matrix Constraints
let state = { 
    scale: 1, 
    offsetX: 150, 
    offsetY: 150, 
    cellSize: 18,
    paddingCushion: 1000 // Extra empty spatial coordinates allowing deep edge tracking zoom out
};

let lastMousePos = { x: 0, y: 0 };
let isDragging = false;

function resizeCanvas() {
    canvas.width = container.clientWidth;
    canvas.height = container.clientHeight;
    requestAnimationFrame(draw);
}
window.addEventListener('resize', resizeCanvas);

// Builds optimized pre-cached layout data model
function buildOffscreenBuffer() {
    if (jpKeys.length === 0) return;
    
    const size = state.cellSize;
    offscreenCanvas.width = enKeys.length * size;
    offscreenCanvas.height = jpKeys.length * size;
    
    offscreenCtx.clearRect(0, 0, offscreenCanvas.width, offscreenCanvas.height);
    
    // Draw directly to virtual backing store layout
    jpKeys.forEach((jp, i) => {
        enKeys.forEach((en, j) => {
            const score = data[jp][en];
            // Pure performance layout color assignment
            offscreenCtx.fillStyle = `hsl(${score * 120}, 75%, 45%)`;
            offscreenCtx.fillRect(j * size, i * size, size - 1, size - 1);
        });
    });
    isBufferReady = true;
}

// Ultra-fast 60FPS Render Call using buffer blitting
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (!isBufferReady) return;

    ctx.save();
    ctx.translate(state.offsetX, state.offsetY);
    ctx.scale(state.scale, state.scale);
    
    // Blit the static layout matrix natively 
    ctx.drawImage(offscreenCanvas, 0, 0);
    ctx.restore();
}

// Coordinate tracking math engine
function updateHoverMetric(clientX, clientY) {
    if (jpKeys.length === 0) return;
    
    const rect = canvas.getBoundingClientRect();
    const localX = (clientX - rect.left - state.offsetX) / state.scale;
    const localY = (clientY - rect.top - state.offsetY) / state.scale;
    
    const col = Math.floor(localX / state.cellSize);
    const row = Math.floor(localY / state.cellSize);

    if (row >= 0 && row < jpKeys.length && col >= 0 && col < enKeys.length) {
        const jpKey = jpKeys[row];
        const enKey = enKeys[col];
        const score = data[jpKey][enKey];
        
        tooltip.style.display = 'block';
        tooltip.style.left = (clientX + 20) + 'px';
        tooltip.style.top = (clientY + 15) + 'px';
        tooltip.innerHTML = `
            <div><strong>Source Row [${row + 1}]:</strong> ${jpKey}</div>
            <div><strong>Target Col [${col + 1}]:</strong> ${enKey}</div>
            <div class="score-val">Match Value: ${(score * 100).toFixed(2)}%</div>
        `;
    } else {
        tooltip.style.display = 'none';
    }
}

// Interaction Engine System Events
container.onwheel = (e) => {
    e.preventDefault();
    
    const rect = canvas.getBoundingClientRect();
    const mouseX = e.clientX - rect.left;
    const mouseY = e.clientY - rect.top;

    // Zoom targeting mouse pointer vector
    const wheelFactor = e.deltaY < 0 ? 1.1 : 0.9;
    const newScale = Math.min(Math.max(0.05, state.scale * wheelFactor), 8);

    state.offsetX = mouseX - (mouseX - state.offsetX) * (newScale / state.scale);
    state.offsetY = mouseY - (mouseY - state.offsetY) * (newScale / state.scale);
    state.scale = newScale;

    draw();
    updateHoverMetric(e.clientX, e.clientY);
};

container.onmousedown = (e) => {
    isDragging = true;
    lastMousePos = { x: e.clientX, y: e.clientY };
    tooltip.style.display = 'none'; // Lock tooltips during matrix panning executions
};

window.addEventListener('mousemove', (e) => {
    if (isDragging) {
        state.offsetX += e.clientX - lastMousePos.x;
        state.offsetY += e.clientY - lastMousePos.y;
        lastMousePos = { x: e.clientX, y: e.clientY };
        draw();
    } else {
        // Only trigger intersection updates if pointer enters container bounds
        const bounds = container.getBoundingClientRect();
        if(e.clientX >= bounds.left && e.clientX <= bounds.right && e.clientY >= bounds.top && e.clientY <= bounds.bottom) {
            updateHoverMetric(e.clientX, e.clientY);
        } else {
            tooltip.style.display = 'none';
        }
    }
});

window.addEventListener('mouseup', () => {
    isDragging = false;
});

// Dynamic File Parsing Pipeline
document.getElementById('fileInput').onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    //Chapter naming is 1.txt,2.txt.., so sort the keys numerically to maintain correct chapter order in matrix layout

    const reader = new FileReader();
    reader.onload = (event) => {
        try {
            data = JSON.parse(event.target.result);
            jpKeys = Object.keys(data);
            jpKeys.sort((a, b) => parseInt(a) - parseInt(b));
            if(jpKeys.length === 0) return;
            enKeys = Object.keys(data[jpKeys[0]]);
            enKeys.sort((a, b) => parseInt(a) - parseInt(b));
            
            document.getElementById('matrix-dimens').textContent = `${jpKeys.length} Rows × ${enKeys.length} Cols Matrix`;
            
            // Pre-calculate target structures for instant side-panel matching response
            bestMatches.clear();
            jpKeys.forEach(jp => {
                let topTarget = "";
                let maxScore = -1;
                enKeys.forEach(en => {
                    if(data[jp][en] > maxScore) {
                        maxScore = data[jp][en];
                        topTarget = en;
                    }
                });
                bestMatches.set(jp, { name: topTarget, val: maxScore });
            });

            // Populate high performance side nodes list
            const listContainer = document.getElementById('chapterList');
            listContainer.innerHTML = jpKeys.map((k, index) => {
                const matchObj = bestMatches.get(k);
                const percentage = (matchObj.val * 100).toFixed(0);
                return `
                    <div class="chapter-item" data-row-idx="${index}">
                        <span class="chapter-num">#${String(index + 1).padStart(2, '0')}</span>
                        <span class="chapter-name" title="${k}">${k}</span>
                        <span class="prediction-badge" title="Highest prob: ${matchObj.name}">🎯 ${percentage}% ${matchObj.name}</span>
                    </div>
                `;
            }).join('');

            // Reset matrix coordinates state
            state.scale = Math.min(canvas.width / (enKeys.length * state.cellSize), canvas.height / (jpKeys.length * state.cellSize)) * 0.8;
            if(state.scale > 1) state.scale = 1;
            state.offsetX = 40;
            state.offsetY = 40;

            buildOffscreenBuffer();
            resizeCanvas();
            
        } catch (err) {
            alert("Malformed processing alignment structure array detected inside targeted JSON file.");
            console.error(err);
        }
    };
    reader.readAsText(file);
};

// Layout startup initial alignment pass
resizeCanvas();
</script>
</body>
</html>
