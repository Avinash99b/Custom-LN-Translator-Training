embedding:
  model: "intfloat/multilingual-e5-large" # Options: BAAI/bge-m3, paraphrase-multilingual-mpnet-base-v2
  max_characters: 2000
  device: "cuda" # or "cpu"
  mode: "summary" # raw or summary

similarity_weights:
  embedding: 0.5
  title: 0.2
  character: 0.2
  event: 0.1

alignment:
  skip_penalty: -0.15
  match_threshold: 0.5

database:
  path: "aligner_cache.sqlite"