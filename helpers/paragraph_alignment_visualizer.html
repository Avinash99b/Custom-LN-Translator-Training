<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alignment Viewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Noto+Serif+JP:wght@300;400&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  /* ── Tokens ─────────────────────────────────────────────────── */
  :root {
    --ink:        #1a1714;
    --ink-muted:  #6b6560;
    --page:       #f5f0e8;
    --page-warm:  #ede8dc;
    --rule:       #c8bfad;
    --amber:      #e8a827;
    --amber-dim:  rgba(232,168,39,0.18);
    --amber-glow: rgba(232,168,39,0.38);
    --red-bad:    #c0392b;
    --green-ok:   #2e7d46;
    --panel-w:    calc(50vw - 2px);
    --header-h:   52px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--page);
    color: var(--ink);
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 17px;
    line-height: 1.75;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── Top bar ─────────────────────────────────────────────────── */
  #topbar {
    height: var(--header-h);
    background: var(--ink);
    color: var(--page);
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 0 22px;
    flex-shrink: 0;
    z-index: 30;
  }
  #topbar h1 {
    font-family: 'EB Garamond', serif;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    opacity: 0.85;
    white-space: nowrap;
  }
  #load-btn {
    margin-left: auto;
    background: none;
    border: 1px solid rgba(255,255,255,0.3);
    color: var(--page);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 5px 14px;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: border-color 0.15s, background 0.15s;
  }
  #load-btn:hover { border-color: var(--amber); background: rgba(232,168,39,0.12); }
  #file-input { display: none; }

  /* chapter selector */
  #chapter-select {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.22);
    color: var(--page);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 4px 10px;
    cursor: pointer;
    max-width: 200px;
  }
  #chapter-select option { background: #1a1714; color: #f5f0e8; }

  /* stats pill */
  #stats-pill {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.04em;
    opacity: 0.55;
    white-space: nowrap;
  }

  /* sim filter */
  #sim-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    opacity: 0.6;
    white-space: nowrap;
  }
  #sim-filter {
    width: 90px;
    accent-color: var(--amber);
    cursor: pointer;
  }

  /* ── Column header strip ─────────────────────────────────────── */
  #col-headers {
    display: flex;
    height: 34px;
    background: var(--page-warm);
    border-bottom: 1.5px solid var(--rule);
    flex-shrink: 0;
    z-index: 20;
    position: relative;
  }
  .col-label {
    width: var(--panel-w);
    display: flex;
    align-items: center;
    padding: 0 28px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-muted);
  }
  #col-divider-header {
    width: 4px;
    background: var(--rule);
  }

  /* ── Main reading area ───────────────────────────────────────── */
  #reading-area {
    flex: 1;
    display: flex;
    overflow: hidden;
    position: relative;
  }

  /* SVG connector overlay */
  #connector-svg {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 10;
    overflow: visible;
  }
  #connector-line {
    fill: none;
    stroke: var(--amber);
    stroke-width: 1.5;
    opacity: 0;
    transition: opacity 0.18s;
    stroke-dasharray: 5 4;
  }
  #connector-line.visible { opacity: 1; }

  /* scroll panels */
  .scroll-panel {
    width: var(--panel-w);
    height: 100%;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 28px 30px 60px;
    scroll-behavior: smooth;
  }
  .scroll-panel::-webkit-scrollbar { width: 6px; }
  .scroll-panel::-webkit-scrollbar-track { background: transparent; }
  .scroll-panel::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 3px; }

  #panel-divider {
    width: 4px;
    background: var(--rule);
    flex-shrink: 0;
    position: relative;
    z-index: 5;
  }

  /* ── Sentence spans ──────────────────────────────────────────── */
  .sent {
    display: inline;
    border-radius: 2px;
    padding: 1px 0;
    cursor: default;
    transition: background 0.14s;
  }
  /* JP panel: right-to-left reading feel via letter spacing */
  #jp-panel .sent {
    font-family: 'Noto Serif JP', 'Hiragino Mincho Pro', 'Yu Mincho', serif;
    font-weight: 300;
    font-size: 15.5px;
    line-height: 2;
    letter-spacing: 0.04em;
  }
  #en-panel .sent {
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 17px;
  }

  .sent:hover, .sent.active {
    background: var(--amber-dim);
    outline: 1.5px solid var(--amber);
    outline-offset: 1px;
  }
  .sent.peer-highlight {
    background: var(--amber-glow);
    outline: 2px solid var(--amber);
    outline-offset: 2px;
  }

  /* pairing badge */
  .sent::after {
    content: attr(data-pairing);
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    vertical-align: super;
    opacity: 0;
    color: var(--amber);
    margin-left: 2px;
    transition: opacity 0.1s;
  }
  .sent:hover::after, .sent.active::after { opacity: 0.7; }
  /* only show non-1:1 badges */
  .sent[data-pairing="1:1"]::after { display: none; }

  /* similarity dot on hover */
  .sent[data-sim]::before {
    content: '';
    display: inline-block;
    width: 5px; height: 5px;
    border-radius: 50%;
    margin-right: 3px;
    vertical-align: middle;
    opacity: 0;
    transition: opacity 0.1s;
  }
  .sent:hover::before, .sent.active::before { opacity: 1; }
  .sim-hi::before  { background: var(--green-ok); }
  .sim-mid::before { background: var(--amber); }
  .sim-lo::before  { background: var(--red-bad); }

  /* chapter heading inside panels */
  .chapter-heading {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--rule);
    margin-bottom: 18px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--page-warm);
  }

  /* ── Empty / loading state ───────────────────────────────────── */
  #empty-state {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    pointer-events: none;
    z-index: 5;
  }
  #empty-state p {
    font-family: 'EB Garamond', serif;
    font-size: 20px;
    font-style: italic;
    color: var(--rule);
  }
  #empty-state code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    background: var(--page-warm);
    padding: 6px 14px;
    color: var(--ink-muted);
    border: 1px solid var(--rule);
  }
  #empty-state.hidden { display: none; }

  /* ── Tooltip ─────────────────────────────────────────────────── */
  #tooltip {
    position: fixed;
    pointer-events: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    background: var(--ink);
    color: var(--page);
    padding: 4px 9px;
    z-index: 50;
    opacity: 0;
    transition: opacity 0.12s;
    white-space: nowrap;
  }
  #tooltip.show { opacity: 1; }
</style>
</head>
<body>

<!-- Top bar -->
<div id="topbar">
  <h1>Alignment Viewer</h1>
  <select id="chapter-select" style="display:none"><option value="__all__">All chapters</option></select>
  <span id="sim-label">sim ≥ <span id="sim-val">0.00</span></span>
  <input type="range" id="sim-filter" min="0" max="1" step="0.01" value="0">
  <span id="stats-pill"></span>
  <button id="load-btn">Load JSONL ▸</button>
  <input type="file" id="file-input" accept=".jsonl,.json">
</div>

<!-- Column labels -->
<div id="col-headers">
  <div class="col-label">日本語 — Japanese</div>
  <div id="col-divider-header"></div>
  <div class="col-label">English</div>
</div>

<!-- Reading area -->
<div id="reading-area">
  <svg id="connector-svg" xmlns="http://www.w3.org/2000/svg">
    <path id="connector-line"/>
  </svg>

  <div id="empty-state">
    <p>Load a JSONL file to begin</p>
    <code>aligned_sentences.jsonl</code>
  </div>

  <div class="scroll-panel" id="jp-panel"></div>
  <div id="panel-divider"></div>
  <div class="scroll-panel" id="en-panel"></div>
</div>

<div id="tooltip"></div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let ALL_PAIRS   = [];    // full dataset
let CHAPTER_MAP = {};    // chapter → [pairs]
let ACTIVE_ID   = null;  // currently hovered pair id "ch:idx"

// DOM refs
const jpPanel    = document.getElementById('jp-panel');
const enPanel    = document.getElementById('en-panel');
const emptyState = document.getElementById('empty-state');
const connLine   = document.getElementById('connector-line');
const tooltip    = document.getElementById('tooltip');
const simFilter  = document.getElementById('sim-filter');
const simValLbl  = document.getElementById('sim-val');
const statsPill  = document.getElementById('stats-pill');
const chSelect   = document.getElementById('chapter-select');

// ── File loading ───────────────────────────────────────────────────────────
document.getElementById('load-btn').addEventListener('click', () => {
  document.getElementById('file-input').click();
});
document.getElementById('file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => parseJSONL(ev.target.result);
  reader.readAsText(file, 'utf-8');
});

function parseJSONL(text) {
  ALL_PAIRS = [];
  CHAPTER_MAP = {};
  for (const line of text.split('\n')) {
    const t = line.trim();
    if (!t) continue;
    try {
      const obj = JSON.parse(t);
      ALL_PAIRS.push(obj);
      (CHAPTER_MAP[obj.chapter] = CHAPTER_MAP[obj.chapter] || []).push(obj);
    } catch {}
  }
  if (!ALL_PAIRS.length) { alert('No valid pairs found in file.'); return; }

  // Populate chapter selector
  chSelect.innerHTML = '<option value="__all__">All chapters</option>';
  for (const ch of Object.keys(CHAPTER_MAP).sort(naturalCmp)) {
    const opt = document.createElement('option');
    opt.value = ch; opt.textContent = ch;
    chSelect.appendChild(opt);
  }
  chSelect.style.display = '';
  emptyState.classList.add('hidden');

  renderPairs(ALL_PAIRS);
}

// ── Chapter filter ─────────────────────────────────────────────────────────
chSelect.addEventListener('change', () => {
  const v = chSelect.value;
  renderPairs(v === '__all__' ? ALL_PAIRS : (CHAPTER_MAP[v] || []));
});

// ── Sim filter ─────────────────────────────────────────────────────────────
simFilter.addEventListener('input', () => {
  simValLbl.textContent = parseFloat(simFilter.value).toFixed(2);
  const v   = chSelect.value;
  const src = v === '__all__' ? ALL_PAIRS : (CHAPTER_MAP[v] || []);
  renderPairs(src);
});

// ── Render ─────────────────────────────────────────────────────────────────
function simClass(s) {
  return s >= 0.72 ? 'sim-hi' : s >= 0.5 ? 'sim-mid' : 'sim-lo';
}

function renderPairs(pairs) {
  const threshold = parseFloat(simFilter.value);
  const filtered  = pairs.filter(p => p.similarity >= threshold);

  jpPanel.innerHTML = '';
  enPanel.innerHTML = '';
  ACTIVE_ID = null;
  hideConnector();

  // Group by chapter for headings
  const groups = [];
  let curChapter = null, curGroup = null;
  for (const p of filtered) {
    if (p.chapter !== curChapter) {
      curGroup = { chapter: p.chapter, pairs: [] };
      groups.push(curGroup);
      curChapter = p.chapter;
    }
    curGroup.pairs.push(p);
  }

  for (const g of groups) {
    // Chapter heading — both panels
    const mkHeading = () => {
      const h = document.createElement('div');
      h.className = 'chapter-heading';
      h.textContent = g.chapter;
      return h;
    };
    jpPanel.appendChild(mkHeading());
    enPanel.appendChild(mkHeading());

    for (const p of g.pairs) {
      const pid = p.chapter + ':' + p.pair_index;
      const sc  = simClass(p.similarity);

      const mkSpan = (text, side) => {
        const sp = document.createElement('span');
        sp.className  = `sent ${sc}`;
        sp.dataset.id = pid;
        sp.dataset.sim     = p.similarity.toFixed(3);
        sp.dataset.pairing = p.pairing;
        sp.dataset.side    = side;
        sp.textContent = text + ' ';
        return sp;
      };

      jpPanel.appendChild(mkSpan(p.jp, 'jp'));
      enPanel.appendChild(mkSpan(p.en, 'en'));
    }
  }

  // Stats
  statsPill.textContent =
    `${filtered.length} pairs · avg sim ${avgSim(filtered).toFixed(3)}`;

  attachHoverListeners();
}

function avgSim(pairs) {
  if (!pairs.length) return 0;
  return pairs.reduce((s, p) => s + p.similarity, 0) / pairs.length;
}

// ── Hover / highlight ──────────────────────────────────────────────────────
function attachHoverListeners() {
  document.querySelectorAll('.sent').forEach(el => {
    el.addEventListener('mouseenter', onSentEnter);
    el.addEventListener('mouseleave', onSentLeave);
    el.addEventListener('mousemove',  onSentMove);
  });
}

function onSentEnter(e) {
  const id   = e.currentTarget.dataset.id;
  const side = e.currentTarget.dataset.side;
  ACTIVE_ID  = id;

  // Highlight this sentence
  e.currentTarget.classList.add('active');

  // Find and highlight peer
  const peerSide = side === 'jp' ? 'en' : 'jp';
  const peer = document.querySelector(`.sent[data-id="${id}"][data-side="${peerSide}"]`);
  if (peer) {
    peer.classList.add('peer-highlight');
    scrollIntoViewIfNeeded(peer, peerSide === 'jp' ? jpPanel : enPanel);
    drawConnector(e.currentTarget, peer);
  }
}

function onSentLeave(e) {
  const id   = e.currentTarget.dataset.id;
  ACTIVE_ID  = null;
  e.currentTarget.classList.remove('active');

  document.querySelectorAll(`.sent[data-id="${id}"]`).forEach(el => {
    el.classList.remove('active', 'peer-highlight');
  });
  hideConnector();
  tooltip.classList.remove('show');
}

function onSentMove(e) {
  tooltip.style.left = (e.clientX + 14) + 'px';
  tooltip.style.top  = (e.clientY - 28) + 'px';
  tooltip.textContent = `sim ${e.currentTarget.dataset.sim}  ·  ${e.currentTarget.dataset.pairing}`;
  tooltip.classList.add('show');
}

// ── Scroll peer into view ──────────────────────────────────────────────────
function scrollIntoViewIfNeeded(el, panel) {
  const panelRect = panel.getBoundingClientRect();
  const elRect    = el.getBoundingClientRect();
  const margin    = 80;

  if (elRect.top < panelRect.top + margin || elRect.bottom > panelRect.bottom - margin) {
    const targetScroll =
      panel.scrollTop + elRect.top - panelRect.top
      - panelRect.height / 2 + elRect.height / 2;
    panel.scrollTo({ top: targetScroll, behavior: 'smooth' });
  }

  // After scroll settles, redraw connector
  setTimeout(() => {
    if (ACTIVE_ID) {
      const src  = document.querySelector(`.sent[data-id="${ACTIVE_ID}"].active, .sent[data-id="${ACTIVE_ID}"].peer-highlight`);
      const src2 = document.querySelector(`.sent[data-id="${ACTIVE_ID}"][data-side="jp"]`);
      const src3 = document.querySelector(`.sent[data-id="${ACTIVE_ID}"][data-side="en"]`);
      if (src2 && src3) drawConnector(src2, src3);
    }
  }, 280);
}

// ── SVG connector line ─────────────────────────────────────────────────────
function drawConnector(el1, el2) {
  // el1 = jp span, el2 = en span (or vice-versa — we normalise)
  const jpEl = el1.dataset.side === 'jp' ? el1 : el2;
  const enEl = el1.dataset.side === 'en' ? el1 : el2;

  const svgEl  = document.getElementById('connector-svg');
  const svgBox = svgEl.getBoundingClientRect();

  const r1 = jpEl.getBoundingClientRect();
  const r2 = enEl.getBoundingClientRect();

  // Exit right edge of JP panel → enter left edge of EN panel
  const x1 = r1.right  - svgBox.left;
  const y1 = r1.top    - svgBox.top  + r1.height / 2;
  const x2 = r2.left   - svgBox.left;
  const y2 = r2.top    - svgBox.top  + r2.height / 2;
  const cx = (x1 + x2) / 2;

  // Cubic bezier through the divider
  connLine.setAttribute('d', `M ${x1} ${y1} C ${cx} ${y1}, ${cx} ${y2}, ${x2} ${y2}`);
  connLine.classList.add('visible');
}

function hideConnector() {
  connLine.classList.remove('visible');
}

// Redraw on scroll (both panels)
[jpPanel, enPanel].forEach(panel => {
  panel.addEventListener('scroll', () => {
    if (ACTIVE_ID) {
      const jpEl = document.querySelector(`.sent[data-id="${ACTIVE_ID}"][data-side="jp"]`);
      const enEl = document.querySelector(`.sent[data-id="${ACTIVE_ID}"][data-side="en"]`);
      if (jpEl && enEl) drawConnector(jpEl, enEl);
      else hideConnector();
    }
  });
});

// ── Natural sort for chapter names ────────────────────────────────────────
function naturalCmp(a, b) {
  const re = /(\d+)/g;
  const pa = a.split(re), pb = b.split(re);
  for (let i = 0; i < Math.max(pa.length, pb.length); i++) {
    const x = pa[i] || '', y = pb[i] || '';
    const nx = parseInt(x, 10), ny = parseInt(y, 10);
    if (!isNaN(nx) && !isNaN(ny)) { if (nx !== ny) return nx - ny; }
    else { if (x < y) return -1; if (x > y) return 1; }
  }
  return 0;
}
</script>
</body>
</html>
